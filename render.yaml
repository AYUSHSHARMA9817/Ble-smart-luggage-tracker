services:
  - type: web
    name: ble-tracker-backend
    runtime: docker
    rootDir: backend
    plan: free
    envVars:
      - key: PORT
        value: 8787
      - key: DATA_PATH
        value: /data/app.json
      - key: ADMIN_REGISTRATION_SECRET
        sync: false
    disk:
      name: ble-tracker-data
      mountPath: /data
      sizeGB: 1
